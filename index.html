<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RCO Living</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#080a0d;font-family:Inter,Arial,sans-serif}
    .cover{min-height:100vh;display:grid;place-items:center;background:#080a0d;padding:0}
    .poster{position:relative;width:min(100vw,768px);aspect-ratio:768/1365;background:url("portada-oficial.png") center/contain no-repeat}
    .enter-hit{
      position:absolute;left:16%;right:16%;top:73%;height:10%;
      border:0;border-radius:26px;background:transparent;cursor:pointer;
      text-indent:-9999px;overflow:hidden;
    }
    .enter-hit:focus-visible{outline:4px solid #fff;outline-offset:5px}
    .enter-hit:active{transform:scale(.985)}
    @media(min-width:900px){
      .poster{height:100vh;width:auto;max-width:100vw}
    }
  </style>
</head>
<body>
  <main class="cover">
    <section class="poster" aria-label="Portada oficial RCO Living">
      <a class="enter-hit" href="acceso.html" aria-label="Ingresar al Centro de Atención de RCO Living">Ingresar</a>
    </section>
  </main>
</body>
</html>
