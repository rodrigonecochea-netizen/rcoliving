<!DOCTYPE html>
<html lang="es">
<head>
<meta name="description" content="RCO Living, división operativa de RCO & Asociados para mantenimiento, administración y cuidado integral de propiedades.">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#080a0d">
  <title>RCO Living</title>
  <link rel="stylesheet" href="sistema.css">
<link rel="icon" href="logo-rco-living.png">
<link rel="manifest" href="site.webmanifest">
</head>
<body class="landing-body">
  <main class="cover">
    <section class="poster" aria-label="RCO Living">
      <div class="lang-floating" aria-label="Selector de idioma">
        <button data-lang="pt">PT</button>
        <button data-lang="es">ES</button>
        <button data-lang="en">EN</button>
      </div>
      <a class="enter-hit" href="divisiones.html" data-i18n-aria="enterAria">
        <span data-i18n="enter">INGRESAR</span>
      </a>
    </section>
  </main>
  <script src="i18n.js"></script>
  <script>
    RCO_I18N.init();
    const link = document.querySelector('.enter-hit');
    const params = new URLSearchParams(location.search);
    if (params.get('propiedad')) link.href = `divisiones.html?propiedad=${encodeURIComponent(params.get('propiedad'))}`;
  </script>
<script src="app.js"></script>
</body>
</html>
