<script src="i18n.js"></script><script>RCO_I18N.init();const p=new URLSearchParams(location.search),tipo=p.get('tipo')||'ocasional',prop=p.get('propiedad'),cliente=p.get('cliente'),nombre=p.get('nombre'),division=p.get('division')||'MT',divisionName=p.get('divisionName')||'Mantenimiento';document.getElementById('divisionSelected').textContent='✓ '+divisionName;document.getElementById('contextLine').textContent=tipo==='registrado'?`${cliente||''} · ${prop||''}`:(nombre||'');const f=document.getElementById('fecha'),d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());f.min=d.toISOString().split('T')[0];document.getElementById('requestForm').onsubmit=e=>{e.preventDefault();let seq=Number(localStorage.getItem('rco_mt_sequence')||'10000')+1;localStorage.setItem('rco_mt_sequence',seq);const id=`RCO-${division}-${seq}`,fd=new FormData(e.target);const item={id,division,divisionName,created:new Date().toISOString(),tipo,cliente:cliente||'',propiedad:prop||'',nombre:nombre||'',servicio:fd.get('servicio'),fecha:fd.get('fecha'),turno:fd.get('turno'),prioridad:fd.get('prioridad'),estado:'Recibida'};const list=JSON.parse(localStorage.getItem('rco_requests')||'[]');list.unshift(item);localStorage.setItem('rco_requests',JSON.stringify(list));document.getElementById('tracking').textContent=id;const msg=Object.entries(item).map(([k,v])=>`${k}: ${v}`).join('\n');document.getElementById('waBtn').href='https://wa.me/5581998991468?text='+encodeURIComponent(msg);document.getElementById('requestPanel').style.display='none';document.getElementById('successPanel').style.display='block';window.scrollTo({top:0,behavior:'smooth'});};</script><script src="app.js"></script>
