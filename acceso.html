<!DOCTYPE html><html lang="es"><head>

</head><body>

<main class="shell">

<script src="i18n.js"></script><script>
RCO_I18N.init();
const q=new URLSearchParams(location.search),division=q.get('division')||'MT',divisionName=q.get('divisionName')||'Mantenimiento',property=q.get('propiedad');
const reg=document.getElementById('registeredLink'),occ=document.querySelector('a[href="ocasional.html"]');

</script>
